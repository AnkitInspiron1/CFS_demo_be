version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: nest-postgres-14
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: nestuser
      POSTGRES_PASSWORD: nestpass
      POSTGRES_DB: nestdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: